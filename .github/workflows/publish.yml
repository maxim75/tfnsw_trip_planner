name: Publish to PyPI

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  id-token: write  # Required for PyPI Trusted Publisher (OIDC)

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    # Only run when the PR was actually merged, not just closed.
    if: github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build

      - name: Validate package
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    environment:
      name: pypi
      url: https://pypi.org/p/tfnsw-trip-planner

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Merges that don't bump the version are a no-op rather than a failure.
          skip-existing: true
